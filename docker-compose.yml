version: "3.9"

services:
  backend:
    image: ${IMAGE}
    container_name: ${CONTAINER_NAME:-supervisesuite-be}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "${APP_PORT:-8081}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      supervisesuite_internal:
      npm_external:
        aliases:
          - ${NETWORK_ALIAS:-supervisesuite-be}

  postgres:
    image: postgres:16-alpine
    container_name: ${DB_CONTAINER_NAME:-supervisesuite-db}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - supervisesuite_internal

volumes:
  postgres-data:

networks:
  supervisesuite_internal:
    name: ${INTERNAL_NET_NAME:-supervisesuite_internal}
    driver: bridge
    internal: true
  npm_external:
    external: true
    name: ${NPM_NET_NAME:-npm_default}
