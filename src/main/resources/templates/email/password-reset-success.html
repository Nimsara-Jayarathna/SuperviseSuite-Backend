<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{email/base-layout :: layout(~{::body}, 'Password reset successful', 'Secure My Account', ${forgotPasswordUrl}, 'danger')}">
<body>
<p style="margin:0 0 16px 0;">Hi <strong th:text="${name}">User</strong>,</p>
<p style="margin:0 0 16px 0;">This is a confirmation that your SuperviseSuite account password was reset successfully.</p>
<p style="margin:0 0 16px 0;">If this was you, no further action is needed.</p>
<p style="margin:0;"><strong>If you did not reset your password, secure your account immediately.</strong></p>
</body>
</html>
