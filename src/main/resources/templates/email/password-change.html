<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{email/base-layout :: layout(~{::body}, 'Security Alert: Password Changed', 'Secure My Account', ${forgotPasswordUrl}, 'danger')}">
<body>
<p style="margin:0 0 16px 0;">Hi <strong th:text="${name}">User</strong>,</p>
<p style="margin:0 0 16px 0;">This is a notification that the password for your SuperviseSuite account has been changed.</p>
<p style="margin:0 0 16px 0;"><strong>If you did not make this change, secure your account immediately using the button below.</strong></p>
<p style="margin:0;">If you made this change yourself, you can safely ignore this email.</p>
</body>
</html>
