<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{email/base-layout :: layout(~{::body}, 'Your verification code', null, null, null)}">
<body>
<p style="margin:0 0 16px 0;">Use the code below to verify your email address. It expires in 10 minutes.</p>
<table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="border-collapse:collapse; margin:0 0 16px 0;">
    <tr>
        <td align="center">
            <table role="presentation" border="0" cellpadding="0" cellspacing="0" style="border-collapse:collapse;">
                <tr>
                    <td style="background-color:#f3f4f6; border:1px solid #e5e7eb; border-radius:8px; padding:12px 22px; font-family:Courier New, Courier, monospace; font-size:32px; line-height:36px; font-weight:700; letter-spacing:6px; color:#111827;">
                        <span th:text="${otp}">000000</span>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
<p style="margin:0 0 16px 0;">If you did not request this code, you can safely ignore this email.</p>
<p style="margin:0;">Best regards,<br/>The SuperviseSuite Team</p>
</body>
</html>
