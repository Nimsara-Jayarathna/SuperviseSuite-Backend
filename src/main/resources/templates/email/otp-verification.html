<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{email/base-layout :: layout(~{::body})}">
<body>
    <h2>Your verification code</h2>
    <p>Use the code below to verify your email address. It expires in 10 minutes.</p>
    <div style="text-align: center; margin: 32px 0;">
        <div style="display: inline-block; background-color: #f3f4f6; border-radius: 12px;
                    padding: 20px 40px; font-size: 36px; font-weight: 800;
                    letter-spacing: 0.15em; color: #111827; font-family: monospace;">
            <span th:text="${otp}">000000</span>
        </div>
    </div>
    <p>If you did not request this code, you can safely ignore this email.</p>
    <p>Best regards,<br/>The SuperviseSuite Team</p>
</body>
</html>
