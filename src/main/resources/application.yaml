spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: SuperviseSuite Backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    baseline-on-migrate: false
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
server:
  port: ${APP_PORT}
app:
  base-url: ${APP_BASE_URL}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-seconds: ${JWT_ACCESS_EXPIRY_SECONDS:900}
    refresh-token-expiry-seconds: ${JWT_REFRESH_EXPIRY_SECONDS:604800}
