spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: SuperviseSuite Backend
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  devtools:
    restart:
      # Keep Flyway SQL migrations on the base classloader; avoids classpath
      # inputstream issues after migration renames during local development.
      additional-exclude: db/migration/**
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: false
    validate-on-migrate: false
server:
  port: ${APP_PORT}
app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-seconds: ${JWT_ACCESS_EXPIRY_SECONDS:900}
    refresh-token-expiry-seconds: ${JWT_REFRESH_EXPIRY_SECONDS:604800}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  cookie:
    # Set to false in local dev (HTTP). Must be true in production (HTTPS).
    # Browsers (except Chrome) block Secure cookies over plain HTTP even on localhost.
    secure: ${COOKIE_SECURE:true}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  github:
    api-base-url: ${GITHUB_API_BASE_URL:https://api.github.com}
    token: ${GITHUB_TOKEN:}
    app-id: ${GITHUB_APP_ID:}
    app-client-id: ${GITHUB_APP_CLIENT_ID:}
    app-client-secret: ${GITHUB_APP_CLIENT_SECRET:}
    app-install-url: ${GITHUB_APP_INSTALL_URL:}
    app-private-key: ${GITHUB_APP_PRIVATE_KEY:}
    app-webhook-secret: ${GITHUB_APP_WEBHOOK_SECRET:}
    default-branch: ${GITHUB_DEFAULT_BRANCH:main}
    activity-active-window-hours: ${GITHUB_ACTIVITY_ACTIVE_WINDOW_HOURS:48}
    preview-commits-limit: ${GITHUB_PREVIEW_COMMITS_LIMIT:6}
    preview-contributors-limit: ${GITHUB_PREVIEW_CONTRIBUTORS_LIMIT:4}
    dashboard-contributors-limit: ${GITHUB_DASHBOARD_CONTRIBUTORS_LIMIT:5}
    commits-page-size: ${GITHUB_COMMITS_PAGE_SIZE:100}
    default-page-size: ${GITHUB_DEFAULT_PAGE_SIZE:10}
    max-page-size: ${GITHUB_MAX_PAGE_SIZE:100}
    max-linked-repos-per-project: ${GITHUB_MAX_LINKED_REPOS_PER_PROJECT:5}
    max-enabled-repos-per-project: ${GITHUB_MAX_ENABLED_REPOS_PER_PROJECT:${GITHUB_MAX_LINKED_REPOS_PER_PROJECT:5}}
    setup-state-ttl-seconds: ${GITHUB_SETUP_STATE_TTL_SECONDS:900}
    setup-state-secret: ${GITHUB_SETUP_STATE_SECRET:${JWT_SECRET}}
    sync-max-commit-pages: ${GITHUB_SYNC_MAX_COMMIT_PAGES:5}
    installation-repositories:
      default-page-size: ${GITHUB_INSTALLATION_REPOSITORIES_DEFAULT_PAGE_SIZE:100}
      max-page-size: ${GITHUB_INSTALLATION_REPOSITORIES_MAX_PAGE_SIZE:100}
    access-requests:
      expires-in-minutes: ${GITHUB_ACCESS_REQUEST_EXPIRES_IN_MINUTES:15}
    jobs:
      access-request-cleanup:
        enabled: ${GITHUB_ACCESS_REQUEST_CLEANUP_ENABLED:true}
        initial-delay-ms: ${GITHUB_ACCESS_REQUEST_CLEANUP_INITIAL_DELAY_MS:120000}
        fixed-delay-ms: ${GITHUB_ACCESS_REQUEST_CLEANUP_FIXED_DELAY_MS:900000}
      repository-refresh:
        enabled: ${GITHUB_REPOSITORY_REFRESH_JOB_ENABLED:true}
        cron: ${GITHUB_REPOSITORY_REFRESH_CRON:0 0 0 * * *}
        zone: ${GITHUB_REPOSITORY_REFRESH_ZONE:UTC}
        batch-size: ${GITHUB_REPOSITORY_REFRESH_BATCH_SIZE:50}
  jira:
    client-id: ${ATLASSIAN_CLIENT_ID:}
    client-secret: ${ATLASSIAN_CLIENT_SECRET:}
    scope: ${ATLASSIAN_SCOPE:read:jira-user read:jira-work}
    audience: ${ATLASSIAN_AUDIENCE:api.atlassian.com}
    auth-target-url: ${ATLASSIAN_AUTH_TARGET_URL:https://auth.atlassian.com/authorize}
    token-target-url: ${ATLASSIAN_TOKEN_TARGET_URL:https://auth.atlassian.com/oauth/token}
    redirect-uri: ${ATLASSIAN_REDIRECT_URI:}
    oauth-state: ${ATLASSIAN_OAUTH_STATE:supervisesuite_jira_state}
    oauth-state-ttl-seconds: ${ATLASSIAN_OAUTH_STATE_TTL_SECONDS:900}
    token-encryption-secret: ${ATLASSIAN_TOKEN_ENCRYPTION_SECRET:${JWT_SECRET:}}
    analytics:
      recent-sprints-limit: ${ATLASSIAN_ANALYTICS_RECENT_SPRINTS_LIMIT:3}
      backlog-growing-consecutive-weeks: ${ATLASSIAN_ANALYTICS_BACKLOG_GROWING_CONSECUTIVE_WEEKS:2}
      high-priority-names: ${ATLASSIAN_ANALYTICS_HIGH_PRIORITY_NAMES:High,Highest}
      bug-type-names: ${ATLASSIAN_ANALYTICS_BUG_TYPE_NAMES:Bug}
