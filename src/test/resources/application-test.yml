app:
  project-files:
    aws-region: ap-south-1
    bucket-name: supervisesuite-files-test
    aws-access-key-id: test-access-key
    aws-secret-access-key: test-secret-key
  test:
    use-testcontainers: false

spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:supervisesuite_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
